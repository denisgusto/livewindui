name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            laravel: '10.0'
            testbench: '^8.0'
            livewire: '^3.5'
          - php: '8.3'
            laravel: '11.0'
            testbench: '^9.0'
            livewire: '^3.5|^4.3'
          - php: '8.3'
            laravel: '12.0'
            testbench: '^10.0'
            livewire: '^3.5|^4.3'
          - php: '8.4'
            laravel: '13.0'
            testbench: '^11.0'
            livewire: '^4.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite
          coverage: none

      - name: Configure Laravel matrix
        run: |
          composer require --no-update \
            "illuminate/console:^${{ matrix.laravel }}" \
            "illuminate/contracts:^${{ matrix.laravel }}" \
            "illuminate/pagination:^${{ matrix.laravel }}" \
            "illuminate/support:^${{ matrix.laravel }}" \
            "illuminate/view:^${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "livewire/livewire:${{ matrix.livewire }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Pint
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Pest
        run: vendor/bin/pest

  assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Ensure committed dist/ is up to date
        run: git diff --exit-code -- dist/

